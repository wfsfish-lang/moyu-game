<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>摸鱼签签到</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:linear-gradient(180deg,#e8f4fd,#7ec8e3);min-height:100vh;color:#333}
.wrap{max-width:420px;margin:0 auto;padding:20px 16px}
.hd{text-align:center;padding:20px 0 10px}
.hd h1{font-size:26px;color:#1a73e8}
.hd p{font-size:13px;color:#666;margin-top:4px}
.card{background:#fff;border-radius:16px;padding:20px;margin:12px 0;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.row .lb{font-size:14px;color:#666}
.row .vl{font-size:14px;font-weight:600}
.green{color:#34a853}
.red{color:#ea4335}
.week{display:flex;justify-content:space-between;gap:4px;margin-top:10px}
.week .di{flex:1;text-align:center}
.week .dn{font-size:12px;color:#666;margin-bottom:6px}
.week .dc{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid #e0e0e0;background:#f5f5f5;margin:0 auto 4px}
.week .dc.ok{border-color:#34a853;background:#e6f4ea}
.week .dc.cur{border-color:#1a73e8;background:#e3f2fd}
.week .ct{font-size:11px;color:#666}
.fzone{text-align:center}
.fzone h3{font-size:15px}
.fzone .fn{font-size:13px;color:#666;margin:4px 0 12px}
.fishbox{height:150px;display:flex;align-items:center;justify-content:center}
.fishbox span{font-size:80px;display:inline-block;animation:sw 3s ease-in-out infinite}
@keyframes sw{0%,100%{transform:translateX(0)}25%{transform:translateX(8px) rotate(2deg)}75%{transform:translateX(-8px) rotate(-2deg)}}
.btn{display:inline-block;background:linear-gradient(135deg,#1a73e8,#4285f4);color:#fff;border:none;border-radius:30px;padding:14px 36px;font-size:17px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(26,115,232,.35);margin-top:12px}
.btn:active{transform:scale(.96)}
.btn:disabled{background:#bbb;box-shadow:none;cursor:not-allowed}
.note{font-size:12px;color:#999;margin-top:8px}
.reward{text-align:center;display:none}
.reward.show{display:block}
.reward .ri{font-size:48px}
.reward h3{font-size:18px;color:#e8a020;margin:8px 0 4px}
.reward p{font-size:13px;color:#666}

.mask{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;justify-content:center;align-items:center;padding:16px}
.mask.show{display:flex}
.pop{background:#fff;border-radius:20px;width:100%;max-width:380px;padding:24px 20px;animation:pIn .3s ease-out}
@keyframes pIn{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.pop .pt{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
.pop .ps{font-size:13px;color:#666;text-align:center;margin-bottom:16px}
.dots{display:flex;justify-content:center;gap:8px;margin-bottom:16px}
.dots i{display:block;width:10px;height:10px;border-radius:50%;background:#e0e0e0;font-style:normal}
.dots i.on{background:#1a73e8}
.dots i.ok{background:#34a853}
.dots i.no{background:#ea4335}
.qt{font-size:16px;font-weight:600;line-height:1.5;margin-bottom:14px}
.opts button{display:block;width:100%;text-align:left;padding:12px 14px;border:2px solid #e8e8e8;border-radius:12px;background:#fafafa;font-size:15px;cursor:pointer;margin-bottom:8px;color:#333;line-height:1.4}
.opts button.ok{border-color:#34a853;background:#e6f4ea}
.opts button.no{border-color:#ea4335;background:#fce8e6}
.rc{text-align:center;padding:16px 0}
.rc .ri{font-size:56px;margin-bottom:10px}
.rc .rt{font-size:20px;font-weight:700;margin-bottom:6px}
.rc .rd{font-size:14px;color:#666;line-height:1.8;white-space:pre-line;margin-bottom:20px}
.rc button{background:linear-gradient(135deg,#1a73e8,#4285f4);color:#fff;border:none;border-radius:25px;padding:10px 36px;font-size:16px;font-weight:600;cursor:pointer}
</style>
</head>

<div class="wrap">
  <div class="hd">
    <h1>🐟 摸鱼签签到</h1>
    <p>上班不摸鱼，和咸鱼有什么区别</p>
  </div>

  <div class="card">
    <div class="row"><span class="lb">📅 今天</span><span class="vl" id="sDate">--</span></div>
    <div class="row"><span class="lb">⏰ 摸鱼窗口</span><span class="vl" id="sTime">--</span></div>
    <div class="row"><span class="lb">🎣 今日摸鱼</span><span class="vl" id="sCnt">0/3</span></div>
  </div>

  <div class="card">
    <h3 style="font-size:15px;margin-bottom:8px">📊 本周摸鱼进度</h3>
    <div class="week" id="weekEl"></div>
  </div>

  <div class="card reward" id="rewardEl">
    <div class="ri">👑🧜‍♂️</div>
    <h3>恭喜获得「人鱼王」称号！</h3>
    <p>连续一周摸鱼成功，你是摸鱼界的王者！</p>
  </div>

  <div class="card fzone">
    <h3>今日之鱼</h3>
    <p class="fn" id="fishName">--</p>
    <div class="fishbox"><span id="fishIcon" style="font-size:80px">🐟</span></div>
    <button class="btn" id="goBtn">👋 摸鱼</button>
    <div class="note" id="noteEl"></div>
  </div>
</div>

<!-- 答题弹窗 -->
<div class="mask" id="quizMask">
  <div class="pop">
    <div class="pt">🧠 摸鱼考验</div>
    <div class="ps" id="quizSub">答对3题才能成功摸鱼哦</div>
    <div class="dots" id="dotsEl"><i></i><i></i><i></i></div>
    <div class="qt" id="qText">--</div>
    <div class="opts" id="optsEl"></div>
  </div>
</div>

<!-- 结果弹窗 -->
<div class="mask" id="resMask">
  <div class="pop">
    <div class="rc">
      <div class="ri" id="resIcon">🎉</div>
      <div class="rt" id="resTitle">--</div>
      <div class="rd" id="resDesc">--</div>
      <button id="resClose">知道了</button>
    </div>
  </div>
</div>

function gWk() {

}

  var k=gWk(), d=gDow();

}

  var d=gState.w[gWk()]; if(!d) return false;
  for(var i=1;i<=5;i++) if(!d[i]||d[i]<3) return false;

function refresh() {
  var n=new Date(), wt=gIsWt(), c=gCnt(), d=gDow();
  var fi = d<=5 ? FISH[d-1] : FISH[0];

  document.getElementById("sDate").textContent = (n.getMonth()+1)+"月"+n.getDate()+"日 "+DN[n.getDay()];
  var te = document.getElementById("sTime");
  te.textContent = wt?"摸鱼中...":"非摸鱼时段";
  te.className = "vl "+(wt?"green":"red");
  var ce = document.getElementById("sCnt");
  ce.textContent = c+"/3";
  ce.className = "vl "+(c>=3?"green":"");

  document.getElementById("fishName").textContent = (fi?fi[1]:"鱼")+" · "+(DN5[d-1]||"今日")+"之鱼";
  document.getElementById("fishIcon").textContent = fi?fi[2]:"🐟";
  document.getElementById("fishIcon").style.fontSize = (80+c*12)+"px";

  var btn = document.getElementById("goBtn");
  if (wt && c>=3) {
    btn.disabled = true;
    btn.textContent = "✅ 今日已完成";
  } else if (wt) {
    btn.disabled = false;
    btn.textContent = "👋 摸鱼（"+c+"/3）";
  } else {
    btn.disabled = false;
    btn.textContent = "🎮 体验摸鱼";
  }
  document.getElementById("noteEl").textContent = wt?"":"非摸鱼时段(10:00-18:00)，体验不计入进度";

  // 周进度
  var we = document.getElementById("weekEl");
  we.innerHTML = "";
  var wd = gState.w[gWk()]||{};
  for(var i=1;i<=5;i++){
    var ic=wd[i]||0, ok=ic>=3, cur=i===d;
    var s='<div class="di"><div class="dn">'+DN5[i-1]+'</div>';
    s+='<div class="dc'+(ok?' ok':'')+(cur?' cur':'')+'">'+FISH[i-1][2]+'</div>';
    s+='<div class="ct">'+ic+'/3</div></div>';
    we.innerHTML += s;
  }

  var re = document.getElementById("rewardEl");
  re.className = gWkOk()?"card reward show":"card reward";
}

// --- 答题 ---
function pick3() {
  var a=Q_LIST.slice(), r=[];
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  for(var k=0;k<3;k++){
    var q=a[k], right=q[1], opts=q.slice(1);
    for(var m=opts.length-1;m>0;m--){var j2=Math.floor(Math.random()*(m+1));var t2=opts[m];opts[m]=opts[j2];opts[j2]=t2;}
    r.push({q:q[0], o:opts, a:opts.indexOf(right)});
  }
  return r;
}

function startQuiz() {
  var wt=gIsWt(), c=gCnt();
  if(wt && c>=3) return;
  gQuiz = {qs:pick3(), i:0, ok:0, pr:!wt};
  showQ();
  document.getElementById("quizMask").className="mask show";
}

function showQ() {
  var q=gQuiz.qs[gQuiz.i];
  document.getElementById("qText").textContent = q.q;
  document.getElementById("quizSub").textContent = "第"+(gQuiz.i+1)+"/3题 · 答对全部才算成功";

  var dots=document.getElementById("dotsEl").children;
  for(var i=0;i<3;i++){
    dots[i].className = i<gQuiz.i?"ok":(i===gQuiz.i?"on":"");
  }

  var oe=document.getElementById("optsEl");
  oe.innerHTML="";
  for(var j=0;j<q.o.length;j++){
    var b=document.createElement("button");
    b.textContent=String.fromCharCode(65+j)+". "+q.o[j];
    b.setAttribute("data-j",j);
    b.onclick=onPick;
    oe.appendChild(b);
  }
}

function onPick(ev) {
  var j=parseInt(ev.target.getAttribute("data-j"));
  var q=gQuiz.qs[gQuiz.i];
  var bs=document.getElementById("optsEl").children;
  for(var i=0;i<bs.length;i++) bs[i].onclick=null;

  var dots=document.getElementById("dotsEl").children;
  if(j===q.a){
    bs[j].className="ok";
    dots[gQuiz.i].className="ok";
    gQuiz.ok++;
  } else {
    bs[j].className="no";
    bs[q.a].className="ok";
    dots[gQuiz.i].className="no";
  }

  setTimeout(function(){
    gQuiz.i++;
    if(gQuiz.i<3) showQ();
    else endQuiz();
  },700);
}

function endQuiz(){
  document.getElementById("quizMask").className="mask";
  var win=gQuiz.ok===3;
  if(win && !gQuiz.pr) gAdd();

  // wow
  if(win){
    var fe=document.getElementById("fishIcon");
    fe.style.transition="transform .5s";
    fe.style.transform="scale(1.4) rotate(10deg)";
    setTimeout(function(){fe.style.transform="scale(1.15)";},600);
    setTimeout(function(){fe.style.transition="";fe.style.transform="";},3000);
  }

  var fi=FISH[gDow()-1]||FISH[0];
  if(win){
    document.getElementById("resIcon").textContent="🎉";
    document.getElementById("resTitle").textContent=gQuiz.pr?"体验成功！":"摸鱼成功！";
    var m="成功摸到"+fi[1]+"！";
    if(gQuiz.pr) m+="\n工作时段(10:00-18:00)才计入进度";
    else{var c2=gCnt();m+="\n今日进度 "+c2+"/3";if(c2>=3)m+="\n🎊 今日任务完成！";}
    if(!gQuiz.pr&&gWkOk()) m+="\n\n👑 连续一周成功！获得「人鱼王」！";
    document.getElementById("resDesc").textContent=m;
  }else{
    document.getElementById("resIcon").textContent="😢";
    document.getElementById("resTitle").textContent="摸鱼失败...";
    document.getElementById("resDesc").textContent="答对了 "+gQuiz.ok+"/3 题\n需要全部答对才能成功\n再试一次！";
  }
  document.getElementById("resMask").className="mask show";
  refresh();
}

// --- 绑定事件 ---
document.getElementById("goBtn").onclick = function(){ startQuiz(); };
document.getElementById("resClose").onclick = function(){ document.getElementById("resMask").className="mask"; };

// --- 启动 ---
loadSt();
refresh();
setInterval(refresh, 60000);
</script>
